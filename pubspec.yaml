name: hotelyn_workspace
description: "Hotelyn Dart workspaces monorepo root."

environment:
  sdk: ">=3.5.0 <4.0.0"

workspace:
  - apps/hotelyn_app
  - apps/hotelyn_dashboard
  - packages/hotelyn_domain
  - packages/hotelyn_gql
  - packages/hotelyn_ui
  - backend

dev_dependencies:
  melos: ^7.3.0
  very_good_analysis: ^10.3.0

melos:
  name: hotelyn

  command:
    bootstrap:
      usePubspecOverrides: false

  scripts:
    analyze:
      run: flutter analyze --fatal-infos
      description: Run static analysis on all packages
      exec:
        concurrency: 1
      packageFilters:
        dirExists:
          - lib

    test:
      run: flutter test --coverage --test-randomize-ordering-seed random
      description: Run all tests across all packages
      exec:
        concurrency: 1
      packageFilters:
        dirExists:
          - test

    build:
      run: flutter pub run build_runner build --delete-conflicting-outputs
      description: Run code generation across all packages
      packageFilters:
        dependsOn:
          - build_runner

    format:
      run: dart format . --set-exit-if-changed
      description: Check Dart formatting across all packages
      exec:
        concurrency: 4
      packageFilters:
        dirExists:
          - lib
